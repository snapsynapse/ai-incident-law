name: Validate

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Validate data pipeline
        run: npm run build

      - uses: actions/checkout@v4
        with:
          repository: snapsynapse/obligation-first
          path: obligation-first

      - name: Validate Obligation-First binding
        run: OBLIGATION_FIRST_DIR="$PWD/obligation-first" npm run validate:of

      - name: Evaluate Obligation-First binding
        run: npm run eval:of

      - name: Check generated artifacts are committed
        run: git diff --exit-code
